<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐦 Vogelhaus Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 900px) { .compact-grid { grid-template-columns: 1fr; } }
        
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .photo-grid img { width: 100%; max-width: 100%; height: auto; border-radius: 0.5rem; border: 1px solid var(--border); }
        .photo-label { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        
        .status-text { max-height: 300px; font-size: 0.75rem; padding: 0.75rem; white-space: pre-wrap; overflow-y: auto; font-family: monospace; }
        
        .stream-btn { width: 100%; padding: 1.5rem; font-size: 1rem; margin-top: 0.5rem; }
        
        .camera-control { padding: 0.75rem; margin-bottom: 0.75rem; }
        .camera-status { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .btn-group button { padding: 0.5rem 1rem; font-size: 0.85rem; }
        
        .loading-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center;
            z-index: 9999;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .github-logo { width: 20px; height: 20px; vertical-align: middle; margin-right: 0.5rem; }
        
        .card { margin-bottom: 1rem; padding: 1rem; }
        .card-title { font-size: 1rem; margin-bottom: 0.75rem; }
        
        .streaming-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .streaming-status.live { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .streaming-status.offline { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.live { background: #22c55e; }
        .status-dot.offline { background: #ef4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent);
            padding: 0.75rem;
            margin-top: 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.85rem;
        }
        .info-box a { color: var(--accent); text-decoration: none; }
        .info-box a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    

    <header>
        <div class="container">
            <h1>🐦 Vogelhaus Dashboard</h1>
            <p class="subtitle">Standort „Thomas" • {{ timestamp }}</p>
        </div>
    </header>

    <div class="container">
        <nav>
            <a href="/" class="active">Dashboard</a>
            <a href="/reports">Berichte</a>
            <a href="/logs">Logs</a>
            <a href="https://www.twitch.tv/meisen_aus_urfahr" target="_blank">📺 Twitch</a>
        </nav>

        <div x-data="{ 
            activeCamera: '{{ active_camera }}',
            streamingStatus: 'checking'
        }" x-init="
            fetch('/internal/camera').then(r => r.json()).then(d => activeCamera = d.active);
            fetch('/internal/streaming/status').then(r => r.json()).then(d => streamingStatus = d.status);
            setInterval(() => {
                fetch('/internal/streaming/status').then(r => r.json()).then(d => streamingStatus = d.status);
            }, 10000);
        ">
            
            <!-- Streaming Control -->
            <div class="card">
                <div class="card-title">📡 Streaming</div>
                <div :class="'streaming-status ' + (streamingStatus === 'live' ? 'live' : 'offline')">
                    <div :class="'status-dot ' + (streamingStatus === 'live' ? 'live' : 'offline')"></div>
                    <span x-text="streamingStatus === 'live' ? '🎥 LIVE auf Twitch' : streamingStatus === 'offline' ? '⏸️ Offline' : '⏳ Prüfe...'"></span>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" 
                            onclick="controlStreaming('start')"
                            :disabled="streamingStatus === 'live'">
                        ▶️ Start
                    </button>
                    <button class="btn btn-secondary"
                            onclick="controlStreaming('stop')"
                            :disabled="streamingStatus === 'offline'">
                        ⏸️ Stop
                    </button>
                    <button class="btn" onclick="window.open('http://100.87.103.34:8080/', '_blank')">
                        🎥 Restreamer
                    </button>
                </div>
            </div>

            <!-- Camera Control -->
            <div class="card">
                <div class="card-title">📹 Kamera</div>
                <div class="camera-control">
                    <div class="camera-status">
                        <div class="indicator" style="display: inline-block;"></div>
                        <strong x-text="activeCamera === 'pi4' ? 'Pi4 (Tag)' : activeCamera === 'noir' ? 'NoIR (Nacht)' : 'Unbekannt'"></strong>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-secondary" 
                                @click="fetch('/internal/camera/pi4', {method: 'POST'}).then(() => activeCamera = 'pi4')"
                                :disabled="activeCamera === 'pi4'">
                            ☀️ Pi4
                        </button>
                        <button class="btn btn-secondary"
                                @click="fetch('/internal/camera/noir', {method: 'POST'}).then(() => activeCamera = 'noir')"
                                :disabled="activeCamera === 'noir'">
                            🌙 NoIR
                        </button>
                    </div>
                    <div class="info-box">
                        💡 <strong>Automatischer Tag/Nacht-Wechsel:</strong>
                        Siehe <a href="https://github.com/githabideri/vogelhaus/blob/main/docs/operations/camera-automation.md" target="_blank">Camera Automation Docs</a>
                    </div>
                </div>
            </div>

            <!-- Photos & Status side-by-side -->
            <div class="compact-grid">
                <div class="card">
                    <div class="card-title">📸 Aufnahmen</div>
                    <div class="photo-grid">
                        <div>
                            <img src="/media/snap_pi4.jpg?t={{ timestamp }}" alt="Pi4" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23334155%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22%3ENicht verf%C3%BCgbar%3C/text%3E%3C/svg%3E'">
                            <div class="photo-label">Pi4</div>
                        </div>
                        <div>
                            <img src="/media/snap_noir.jpg?t={{ timestamp }}" alt="NoIR" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%23334155%22 width=%22200%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22%3ENicht verf%C3%BCgbar%3C/text%3E%3C/svg%3E'">
                            <div class="photo-label">NoIR</div>
                        </div>
                    </div>
                    <div class="btn-group" style="margin-top: 0.75rem; justify-content: center;">
                        <button class="btn" onclick="loadReport('bb')">⚡ BB</button>
                        <button class="btn" onclick="loadReport('o')">📋 OB</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">📊 Status</div>
                    <div class="status-text" id="status-text">Lade...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div style="text-align: center; margin-top: 1.5rem; padding: 1rem; color: var(--text-dim); font-size: 0.85rem;">
            <p>Vogelhaus Monitoring System</p>
            <p style="margin-top: 0.5rem;">
                <a href="https://github.com/githabideri/vogelhaus" target="_blank" style="color: var(--accent); text-decoration: none;">
                    <svg class="github-logo" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    GitHub
                </a>
            </p>
        </div>
    </div>

    <script>
        // Load initial BB report
        document.addEventListener('DOMContentLoaded', () => {
            loadReport('bb');
        });

        function loadReport(mode) {
            const statusEl = document.getElementById('status-text');
            statusEl.textContent = 'Starte Bericht-Generierung...';
            
            // Use EventSource for Server-Sent Events
            const eventSource = new EventSource(`/internal/status/${mode}/stream`);
            let output = '';
            
            eventSource.onmessage = function(event) {
                if (event.data === '__COMPLETE__') {
                    eventSource.close();
                    // Fetch final formatted report
                    fetch(`/internal/status/${mode}`)
                        .then(r => r.json())
                        .then(data => {
                            if (data.text) {
                                statusEl.textContent = data.text;
                            }
                        });
                } else {
                    // Append live output
                    output += event.data;
                    statusEl.textContent = output;
                    // Auto-scroll to bottom
                    statusEl.scrollTop = statusEl.scrollHeight;
                }
            };
            
            eventSource.onerror = function(err) {
                eventSource.close();
                statusEl.textContent = 'Fehler beim Laden des Berichts';
            };
        }

        function controlStreaming(action) {
            
            
            
            fetch(`/internal/streaming/${action}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.message || (action === 'start' ? 'Streaming gestartet' : 'Streaming gestoppt'));
                    // Refresh status
                    setTimeout(() => {
                        fetch('/internal/streaming/status').then(r => r.json()).then(d => {
                            Alpine.store('streamingStatus', d.status);
                        });
                    }, 2000);
                })
                .catch(err => {
                    alert('Fehler: ' + err.message);
                })
                .finally(() => {
                    
                });
        }
    </script>
</body>
</html>
