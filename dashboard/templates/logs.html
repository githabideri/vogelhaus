<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Logs</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <style>
        .log-controls {
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
            padding: 1rem; background: #0a0f1a; border-radius: 0.5rem; margin-bottom: 1rem;
        }
        select, input { 
            padding: 0.5rem; background: var(--card); border: 1px solid var(--border); 
            border-radius: 0.375rem; color: var(--text); 
        }
        .log-viewer {
            background: #0a0f1a; border: 1px solid var(--border); border-radius: 0.5rem;
            padding: 1rem; font-family: 'Courier New', monospace; font-size: 0.75rem;
            line-height: 1.4; max-height: 600px; overflow-y: auto; white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🐦 Vogelhaus Dashboard</h1>
            <p class="subtitle">System-Logs</p>
        </div>
    </header>

    <div class="container">
        <nav>
            <a href="/">Dashboard</a>
            <a href="/reports">Berichte</a>
            <a href="/logs" class="active">Logs</a>
            <a href="https://www.twitch.tv/meisen_aus_urfahr" target="_blank">📺 Twitch</a>
        </nav>

        <div class="card">
            <div class="card-title">📜 System-Logs</div>
            
            <div class="log-controls">
                <label>
                    Service:
                    <select id="service-select" onchange="loadLogs()">
                        <option value="">Alle</option>
                        <optgroup label="Pi4 systemd">
                            <option value="mediamtx">mediamtx</option>
                            <option value="noir-bridge">noir-bridge</option>
                            <option value="usb-failover">usb-failover</option>
                        </optgroup>
                        <optgroup label="Docker">
                            <option value="docker:restreamer">restreamer</option>
                        </optgroup>
                    </select>
                </label>

                <label>
                    Filter:
                    <input type="text" id="filter-input" placeholder="Suchbegriff..." style="width: 200px;">
                </label>

                <button class="btn" onclick="loadLogs()">🔄 Aktualisieren</button>
                <button class="btn btn-secondary" onclick="document.getElementById('filter-input').value=''; loadLogs()">✖ Clear</button>
            </div>

            <div class="log-viewer" id="log-content">
                Klicken Sie "Aktualisieren" um Logs zu laden
            </div>
        </div>

        <div style="text-align: center; margin-top: 1.5rem; padding: 1rem; color: var(--text-dim); font-size: 0.85rem;">
            <a href="https://github.com/githabideri/vogelhaus" target="_blank" style="color: var(--accent); text-decoration: none;">
                <svg style="width: 20px; height: 20px; vertical-align: middle; margin-right: 0.5rem;" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                GitHub
            </a>
        </div>
    </div>

    <script>
        function loadLogs() {
            const service = document.getElementById('service-select').value;
            const filter = document.getElementById('filter-input').value.toLowerCase();
            const content = document.getElementById('log-content');
            
            content.textContent = 'Lade Logs...';
            
            let url = '/internal/logs';
            if (service) {
                url += `?service=${encodeURIComponent(service)}`;
            }
            
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    let logs = data.logs || '';
                    
                    // Apply client-side filter
                    if (filter) {
                        logs = logs.split('\n')
                            .filter(line => line.toLowerCase().includes(filter))
                            .join('\n');
                    }
                    
                    content.textContent = logs || 'Keine Logs gefunden';
                })
                .catch(err => {
                    content.textContent = 'Fehler: ' + err.message;
                });
        }
    </script>
</body>
</html>
