<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 System-Logs — Vogelhaus Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🐦 K.u.K. Vogelhaus-Amt</h1>
            <p class="subtitle">System-Logs</p>
        </div>
    </header>

    <div class="container">
        <nav>
            <a href="/">Dashboard</a>
            <a href="/reports">Berichte</a>
            <a href="/logs" class="active">Logs</a>
            <a href="https://www.twitch.tv/meisen_aus_urfahr" target="_blank">📺 Twitch</a>
        </nav>

        <div class="card">
            <div class="card-title">📜 System-Logs</div>
            
            <!-- Controls -->
            <div class="log-controls">
                <button class="btn btn-secondary" 
                        onclick="loadLogs()">
                    🔄 Aktualisieren
                </button>
            </div>

            <!-- Log Content -->
            <div class="log-viewer" id="log-content" style="white-space: pre-wrap;">
                Klicken Sie "Aktualisieren" um Logs zu laden
            </div>
        </div>

        <!-- Footer -->
        <div style="text-align: center; margin-top: 2rem; padding: 1.5rem; color: var(--text-dim); font-size: 0.9rem;">
            <p>K.u.K. Vogelhaus-Amt — Dienststellenautomation</p>
            <p style="margin-top: 0.5rem;">
                <a href="https://github.com/githabideri/vogelhaus" target="_blank" style="color: var(--accent); text-decoration: none;">
                    📦 GitHub Repository
                </a>
            </p>
        </div>
    </div>

    <style>
        .log-controls {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #0a0f1a;
            border-radius: 0.5rem;
        }
        .log-viewer {
            background: #0a0f1a;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            max-height: 600px;
            overflow-y: auto;
        }
    </style>

    <script>
        function loadLogs() {
            const content = document.getElementById('log-content');
            content.textContent = 'Lade Logs...';
            
            fetch('/internal/logs')
                .then(r => r.json())
                .then(data => {
                    if (data.logs) {
                        content.textContent = data.logs;
                    } else {
                        content.textContent = 'Keine Logs verfügbar';
                    }
                })
                .catch(err => {
                    content.textContent = 'Fehler beim Laden: ' + err.message;
                });
        }
    </script>
</body>
</html>
